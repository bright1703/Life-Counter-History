<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Life Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f5f5f7;
      --bg-tertiary: #e8e8ed;
      --text-primary: #1d1d1f;
      --text-secondary: #6e6e73;
      --text-tertiary: #aeaeb2;
      --border-light: rgba(0,0,0,0.08);
      --border-mid: rgba(0,0,0,0.14);
      --radius-md: 10px;
      --radius-lg: 14px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --purple-fill:#EEEDFE; --purple-text:#534AB7; --purple-dot:#7F77DD;
      --teal-fill:#E1F5EE;   --teal-text:#0F6E56;   --teal-dot:#1D9E75;
      --amber-fill:#FAEEDA;  --amber-text:#854F0B;  --amber-dot:#EF9F27;
      --pink-fill:#FBEAF0;   --pink-text:#993556;   --pink-dot:#D4537E;
      --hot-fill:#FAECE7;    --hot-text:#993C1D;
      --cold-fill:#E6F1FB;   --cold-text:#185FA5;
      --green-fill:#EAF3DE;  --green-text:#3B6D11;
      --red-fill:#FCEBEB;    --red-text:#A32D2D;
      --accent:#0071e3;
    }

    [data-theme="dark"] {
      --bg-primary:#1c1c1e; --bg-secondary:#2c2c2e; --bg-tertiary:#3a3a3c;
      --text-primary:#f5f5f7; --text-secondary:#aeaeb2; --text-tertiary:#6e6e73;
      --border-light:rgba(255,255,255,0.08); --border-mid:rgba(255,255,255,0.14);
      --purple-fill:#26215C; --purple-text:#AFA9EC;
      --teal-fill:#04342C;   --teal-text:#5DCAA5;
      --amber-fill:#412402;  --amber-text:#FAC775;
      --pink-fill:#4B1528;   --pink-text:#ED93B1;
      --hot-fill:#4A1B0C;    --hot-text:#F0997B;
      --cold-fill:#042C53;   --cold-text:#85B7EB;
      --green-fill:#173404;  --green-text:#97C459;
      --red-fill:#501313;    --red-text:#F09595;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font);
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      transition: background 0.25s, color 0.25s;
    }

    /* topbar */
    .topbar { display:flex; justify-content:flex-end; padding:16px 24px 0; }
    .theme-btn {
      display:flex; align-items:center; gap:7px;
      padding:7px 16px;
      background:var(--bg-secondary); color:var(--text-secondary);
      border:0.5px solid var(--border-mid); border-radius:20px;
      font-size:13px; font-weight:500; font-family:var(--font);
      cursor:pointer; transition:background 0.15s, color 0.15s;
    }
    .theme-btn:hover { background:var(--bg-tertiary); color:var(--text-primary); }

    /* header */
    .header { text-align:center; padding:28px 24px 32px; }
    .header h1 { font-size:40px; font-weight:600; letter-spacing:-1px; color:var(--text-primary); }
    .header p { margin-top:10px; font-size:17px; color:var(--text-secondary); }

    /* form */
    .form-wrap { max-width:560px; margin:0 auto 40px; padding:0 20px; }
    .form-card {
      background:var(--bg-secondary); border:0.5px solid var(--border-light);
      border-radius:var(--radius-lg); padding:28px 28px 24px;
    }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
    @media(max-width:480px){ .form-row{grid-template-columns:1fr;} }
    .field label {
      display:block; font-size:12px; font-weight:500; color:var(--text-secondary);
      letter-spacing:0.4px; text-transform:uppercase; margin-bottom:8px;
    }
    .field input {
      width:100%; padding:10px 14px; font-size:15px; font-family:var(--font);
      background:var(--bg-primary); color:var(--text-primary);
      border:0.5px solid var(--border-mid); border-radius:var(--radius-md);
      outline:none; transition:border-color 0.15s;
    }
    .field input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(0,113,227,0.15); }
    .autocomplete-wrap { position:relative; }
    #city-suggestions {
      position:absolute; top:calc(100% + 6px); left:0; right:0;
      background:var(--bg-primary); border:0.5px solid var(--border-mid);
      border-radius:var(--radius-md); z-index:100;
      max-height:220px; overflow-y:auto;
      box-shadow:0 8px 30px rgba(0,0,0,0.12);
    }
    .sugg-item {
      padding:11px 16px; font-size:14px; color:var(--text-primary);
      cursor:pointer; border-bottom:0.5px solid var(--border-light);
    }
    .sugg-item:last-child { border-bottom:none; }
    .sugg-item:hover { background:var(--bg-secondary); }
    .sugg-country { font-size:12px; color:var(--text-secondary); margin-left:6px; }
    .btn-main {
      width:100%; padding:13px; background:var(--accent); color:#fff;
      border:none; border-radius:var(--radius-md); font-size:16px;
      font-weight:500; font-family:var(--font); cursor:pointer;
      transition:background 0.15s, transform 0.1s; letter-spacing:-0.2px;
    }
    .btn-main:hover { background:#0077ed; }
    .btn-main:active { transform:scale(0.985); }
    .btn-main:disabled { background:var(--bg-tertiary); color:var(--text-secondary); cursor:not-allowed; }

    /* results */
    .results { max-width:720px; margin:0 auto; padding:0 20px 60px; }
    .section-label {
      font-size:11px; font-weight:600; letter-spacing:0.6px;
      text-transform:uppercase; color:var(--text-secondary); margin-bottom:14px;
    }

    /* stats */
    .stats-grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:12px; margin-bottom:36px; }
    @media(max-width:480px){ .stats-grid{grid-template-columns:1fr;} }
    .stat-card { background:var(--bg-secondary); border-radius:var(--radius-md); padding:20px 16px; text-align:center; }
    .stat-icon { font-size:22px; margin-bottom:8px; }
    .stat-label-sm { font-size:12px; color:var(--text-secondary); margin-bottom:6px; }
    .stat-value { font-size:22px; font-weight:600; color:var(--text-primary); font-variant-numeric:tabular-nums; letter-spacing:-0.5px; }
    .stat-sub { font-size:11px; color:var(--text-tertiary); margin-top:4px; }

    /* weather */
    .weather-card {
      background:var(--bg-secondary); border:0.5px solid var(--border-light);
      border-radius:var(--radius-lg); padding:24px; margin-bottom:36px;
      display:flex; gap:24px; align-items:center; flex-wrap:wrap;
    }
    .weather-temp { font-size:56px; font-weight:300; color:var(--text-primary); letter-spacing:-2px; line-height:1; }
    .weather-meta { flex:1; min-width:180px; }
    .weather-date { font-size:14px; color:var(--text-secondary); margin-bottom:4px; }
    .weather-city { font-size:16px; font-weight:500; color:var(--text-primary); margin-bottom:10px; }
    .badge { display:inline-block; padding:4px 12px; border-radius:20px; font-size:12px; font-weight:500; }
    .badge-hot  { background:var(--hot-fill);   color:var(--hot-text);  }
    .badge-cold { background:var(--cold-fill);  color:var(--cold-text); }
    .badge-mild { background:var(--green-fill); color:var(--green-text);}

    /* map */
    .map-section { margin-bottom:36px; }
    .map-wrap { border-radius:var(--radius-lg); overflow:hidden; border:0.5px solid var(--border-light); height:280px; }
    .map-wrap iframe { width:100%; height:100%; border:none; display:block; }

    /* celebrities */
    .celeb-section { margin-bottom:36px; }
    .celeb-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:12px; }
    .celeb-card {
      background:var(--bg-secondary); border:0.5px solid var(--border-light);
      border-radius:var(--radius-md); padding:16px 14px; text-align:center;
      cursor:pointer; transition:transform 0.15s, border-color 0.15s, box-shadow 0.15s;
      text-decoration:none; display:block; color:inherit;
    }
    .celeb-card:hover { transform:translateY(-2px); border-color:var(--border-mid); box-shadow:0 4px 16px rgba(0,0,0,0.08); }
    .wiki-link-hint { font-size:10px; color:var(--accent); margin-top:5px; opacity:0.7; }
    .celeb-avatar {
      width:64px; height:64px; border-radius:50%;
      margin:0 auto 10px; display:flex; align-items:center; justify-content:center;
      font-size:17px; font-weight:600; overflow:hidden; flex-shrink:0;
    }
    .celeb-avatar img {
      width:100%; height:100%; object-fit:cover; border-radius:50%; display:block;
    }
    .celeb-name { font-size:13px; font-weight:500; color:var(--text-primary); margin-bottom:3px; line-height:1.35; }
    .celeb-desc { font-size:12px; color:var(--text-secondary); line-height:1.4; }
    .celeb-born { font-size:11px; color:var(--text-tertiary); margin-top:4px; }
    .av0{background:var(--purple-fill);color:var(--purple-text);}
    .av1{background:var(--teal-fill);  color:var(--teal-text);}
    .av2{background:var(--amber-fill); color:var(--amber-text);}
    .av3{background:var(--pink-fill);  color:var(--pink-text);}
    .av4{background:var(--cold-fill);  color:var(--cold-text);}
    .av5{background:var(--green-fill); color:var(--green-text);}

    /* wiki events */
    .wiki-section { margin-bottom:36px; }
    .wiki-item {
      background:var(--bg-primary); border:0.5px solid var(--border-light);
      border-radius:var(--radius-md); padding:13px 17px; margin-bottom:8px;
    }
    .wiki-year { font-size:12px; color:var(--text-secondary); font-weight:500; margin-bottom:3px; }
    .wiki-text { font-size:14px; color:var(--text-primary); line-height:1.5; }
    .show-more-btn {
      width:100%; padding:10px; margin-top:4px;
      background:transparent; border:0.5px solid var(--border-mid);
      border-radius:var(--radius-md); color:var(--text-secondary);
      font-size:13px; font-family:var(--font); cursor:pointer;
      transition:background 0.15s;
    }
    .show-more-btn:hover { background:var(--bg-secondary); color:var(--text-primary); }

    /* timeline */
    .timeline-section { margin-bottom:36px; }
    .tl-legend { display:flex; gap:20px; margin-bottom:18px; flex-wrap:wrap; }
    .tl-legend-item { display:flex; align-items:center; gap:7px; font-size:12px; color:var(--text-secondary); }
    .tl-dot-legend { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .tl-list { position:relative; }
    .tl-line { position:absolute; left:3.5px; top:8px; bottom:8px; width:1px; background:var(--border-mid); }
    .tl-item { display:flex; gap:16px; margin-bottom:18px; align-items:flex-start; position:relative; }
    .tl-dot { width:8px; height:8px; border-radius:50%; margin-top:5px; flex-shrink:0; position:relative; z-index:1; }
    .dot-global   { background:var(--purple-dot); }
    .dot-regional { background:var(--teal-dot); }
    .tl-content { flex:1; }
    .tl-year-tag { font-size:11px; color:var(--text-tertiary); font-weight:500; }
    .tl-text { font-size:14px; color:var(--text-primary); line-height:1.55; margin:2px 0 5px; }
    .tl-badge { display:inline-block; padding:2px 9px; border-radius:10px; font-size:11px; font-weight:500; }
    .tb-global   { background:var(--purple-fill); color:var(--purple-text); }
    .tb-regional { background:var(--teal-fill);   color:var(--teal-text);   }

    /* misc */
    .loading-state { text-align:center; padding:40px 20px; color:var(--text-secondary); font-size:15px; }
    .loading-dot { display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--text-tertiary); margin:0 3px; animation:bounce 1.2s infinite; }
    .loading-dot:nth-child(2){animation-delay:0.2s;} .loading-dot:nth-child(3){animation-delay:0.4s;}
    @keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}
    .error-box { background:var(--red-fill); color:var(--red-text); border-radius:var(--radius-md); padding:14px 18px; font-size:14px; margin-bottom:16px; }
    .divider { height:0.5px; background:var(--border-light); margin:32px 0; }
    .info-note { font-size:12px; color:var(--text-tertiary); margin-top:10px; text-align:center; }
  </style>
</head>
<body>

<div class="topbar">
  <button class="theme-btn" onclick="toggleTheme()" id="theme-btn">
    <span id="theme-icon">🌙</span>
    <span id="theme-label">Dark mode</span>
  </button>
</div>

<div class="header">
  <h1>World Life Tracker</h1>
  <p>Discover the world as it was — and is — around your life</p>
</div>

<div class="form-wrap">
  <div class="form-card">
    <div class="form-row">
      <div class="field">
        <label>Date of birth</label>
        <input type="date" id="dob" max="2024-12-31" min="1920-01-01" />
      </div>
      <div class="field autocomplete-wrap">
        <label>City</label>
        <input type="text" id="city-input" placeholder="Type a city..." autocomplete="off" />
        <div id="city-suggestions"></div>
      </div>
    </div>
    <button class="btn-main" id="go-btn" onclick="runTracker()">Explore my life</button>
  </div>
</div>

<div id="results-area"></div>

<script>
/* ══ THEME ══ */
let currentTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
(function init() {
  document.documentElement.setAttribute('data-theme', currentTheme);
  if (currentTheme === 'dark') {
    document.getElementById('theme-icon').textContent  = '☀️';
    document.getElementById('theme-label').textContent = 'Light mode';
  }
})();

function toggleTheme() {
  currentTheme = currentTheme === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', currentTheme);
  document.getElementById('theme-icon').textContent  = currentTheme === 'dark' ? '☀️' : '🌙';
  document.getElementById('theme-label').textContent = currentTheme === 'dark' ? 'Light mode' : 'Dark mode';
}

/* ══ CITY AUTOCOMPLETE ══ */
let selectedCity = null, suggTimeout = null;

document.getElementById('city-input').addEventListener('input', function() {
  clearTimeout(suggTimeout);
  const q = this.value.trim();
  if (q.length < 2) { document.getElementById('city-suggestions').innerHTML = ''; return; }
  suggTimeout = setTimeout(() => fetchCities(q), 300);
});

async function fetchCities(q) {
  try {
    const r = await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(q)}&limit=7&lang=en`);
    const d = await r.json();
    const box = document.getElementById('city-suggestions');
    const items = d.features.filter(f =>
      ['city','town','village','locality','municipality'].includes(f.properties.type));
    if (!items.length) { box.innerHTML = ''; return; }
    box.innerHTML = items.map((f,i) => {
      const p = f.properties;
      const sub = [p.state, p.country].filter(Boolean).join(', ');
      return `<div class="sugg-item" onclick="selectCity(${i})">${p.name}<span class="sugg-country">${sub}</span></div>`;
    }).join('');
    box._items = items;
  } catch(e) {}
}

function selectCity(i) {
  const box = document.getElementById('city-suggestions');
  const f = box._items[i], p = f.properties;
  selectedCity = {
    name: p.name, country: p.country || '',
    countryCode: (p.countrycode||'').toLowerCase(),
    lat: f.geometry.coordinates[1], lon: f.geometry.coordinates[0],
    displayName: [p.name, p.state, p.country].filter(Boolean).join(', ')
  };
  document.getElementById('city-input').value = selectedCity.displayName;
  box.innerHTML = '';
}
document.addEventListener('click', e => {
  if (!e.target.closest('.autocomplete-wrap'))
    document.getElementById('city-suggestions').innerHTML = '';
});

/* ══ MAIN ══ */
async function runTracker() {
  const dobVal = document.getElementById('dob').value;
  if (!dobVal)       { alert('Please enter your date of birth'); return; }
  if (!selectedCity) { alert('Please select a city from the dropdown'); return; }

  const btn = document.getElementById('go-btn');
  btn.disabled = true; btn.textContent = 'Loading…';
  document.getElementById('results-area').innerHTML = `
    <div class="loading-state">Fetching your life data
      <span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span>
    </div>`;

  try {
    const birth = new Date(dobVal + 'T12:00:00');
    const year  = birth.getFullYear();
    const today = new Date();
    const daysLived    = Math.floor((today - birth) / 86400000);
    const secondsLived = Math.floor((today - birth) / 1000);
    const heartbeats   = Math.round(secondsLived * 70 / 60);
    const orbits       = (daysLived / 365.25).toFixed(2);

    const [weatherHTML, wikiEvents, bdCelebs, localPeople] = await Promise.all([
      buildWeather(dobVal, birth, year),
      fetchAllBirthdayEvents(birth),
      fetchBirthdayCelebs(birth),
      fetchLocalCelebs(selectedCity)
    ]);

    const wikiHTML      = buildWikiHTML(wikiEvents, birth);
    const bdCelebHTML   = buildBdCelebsHTML(bdCelebs, birth);
    const localHTML     = buildLocalHTML(localPeople);
    const timelineHTML  = buildTimeline(year, selectedCity.countryCode, selectedCity.country);
    const mapHTML       = buildMap();
    const statsHTML     = buildStats(daysLived, heartbeats, orbits);

    document.getElementById('results-area').innerHTML = `
      <div class="results">
        ${statsHTML}
        <div class="divider"></div>
        ${weatherHTML}
        ${mapHTML}
        <div class="divider"></div>
        ${bdCelebHTML}
        ${localHTML}
        <div class="divider"></div>
        ${wikiHTML}
        ${timelineHTML}
      </div>`;

    startLiveCounters(birth);
  } catch(err) {
    document.getElementById('results-area').innerHTML =
      `<div class="results"><div class="error-box">Error: ${err.message}</div></div>`;
  }
  btn.disabled = false; btn.textContent = 'Explore my life';
}

/* ── Stats ── */
function buildStats(days, hb, orbits) {
  const yrs = Math.floor(days/365), mos = Math.floor((days%365)/30);
  return `
    <div>
      <p class="section-label">Your life in numbers</p>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon">📅</div>
          <div class="stat-label-sm">Days lived</div>
          <div class="stat-value" id="days-counter">${days.toLocaleString()}</div>
          <div class="stat-sub">${yrs} yrs ${mos} mo</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">❤️</div>
          <div class="stat-label-sm">Heartbeats</div>
          <div class="stat-value" id="hb-counter">${hb.toLocaleString()}</div>
          <div class="stat-sub">~70 bpm average</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">🌍</div>
          <div class="stat-label-sm">Earth orbits</div>
          <div class="stat-value">${orbits}</div>
          <div class="stat-sub">around the Sun</div>
        </div>
      </div>
    </div>`;
}

/* ── Weather ── */
async function buildWeather(dobVal, birth, year) {
  try {
    const {lat, lon} = selectedCity;
    const curYear = new Date().getFullYear();
    const [wDay, wYear] = await Promise.all([
      fetch(`https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}&start_date=${dobVal}&end_date=${dobVal}&daily=temperature_2m_max,temperature_2m_min&timezone=auto`).then(r=>r.json()),
      fetch(`https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}&start_date=${year}-01-01&end_date=${year < curYear ? year+'-12-31' : dobVal}&daily=temperature_2m_max&timezone=auto`).then(r=>r.json())
    ]);
    const dayTemp = wDay.daily?.temperature_2m_max?.[0] ?? null;
    let badgeClass='badge-mild', badgeText='Typical temperature that year';
    if (dayTemp !== null && wYear.daily?.temperature_2m_max) {
      const temps   = wYear.daily.temperature_2m_max.filter(t=>t!==null);
      const maxTemp = Math.max(...temps), minTemp = Math.min(...temps);
      const avgTemp = temps.reduce((a,b)=>a+b,0)/temps.length;
      if (Math.abs(dayTemp-maxTemp)<1.5)      {badgeClass='badge-hot'; badgeText='One of the hottest days that year';}
      else if(Math.abs(dayTemp-minTemp)<1.5)  {badgeClass='badge-cold';badgeText='One of the coldest days that year';}
      else if(dayTemp>avgTemp+5)              {badgeClass='badge-hot'; badgeText='Warmer than average that year';}
      else if(dayTemp<avgTemp-5)              {badgeClass='badge-cold';badgeText='Colder than average that year';}
    }
    const displayTemp = dayTemp !== null ? `${Math.round(dayTemp)}°C` : 'N/A';
    const dateStr = birth.toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
    return `
      <div style="margin-bottom:36px;">
        <p class="section-label">Weather at birth</p>
        <div class="weather-card">
          <div class="weather-temp">${displayTemp}</div>
          <div class="weather-meta">
            <div class="weather-date">Max temperature on ${dateStr}</div>
            <div class="weather-city">${selectedCity.displayName}</div>
            <span class="badge ${badgeClass}">${badgeText}</span>
          </div>
        </div>
      </div>`;
  } catch(e) {
    return `<div class="error-box">Weather data unavailable for this location or date range.</div>`;
  }
}

/* ── Map ── */
function buildMap() {
  const {lat,lon,displayName} = selectedCity;
  return `
    <div class="map-section">
      <p class="section-label">Your place in the world</p>
      <div class="map-wrap">
        <iframe src="https://www.openstreetmap.org/export/embed.html?bbox=${lon-1},${lat-0.7},${lon+1},${lat+0.7}&layer=mapnik&marker=${lat},${lon}"
          allowfullscreen title="Map of ${displayName}"></iframe>
      </div>
    </div>`;
}

/* ── All events on this birthday (Wikipedia) ── */
async function fetchAllBirthdayEvents(birth) {
  const mm = String(birth.getMonth()+1).padStart(2,'0');
  const dd = String(birth.getDate()).padStart(2,'0');
  try {
    const d = await fetch(`https://en.wikipedia.org/api/rest_v1/feed/onthisday/events/${mm}/${dd}`).then(r=>r.json());

// Notability keywords covering all famous people categories
const NOTABLE_TERMS = /actor|actress|singer|musician|composer|rapper|filmmaker|director|president|prime minister|king|queen|emperor|empress|pharaoh|pope|revolutionary|general|admiral|commander|conqueror|explorer|philosopher|scientist|physicist|mathematician|inventor|engineer|astronaut|cosmonaut|writer|author|novelist|poet|painter|sculptor|architect|photographer|journalist|economist|psychologist|biologist|chemist|astronomer|geographer|historian|athlete|footballer|basketball|tennis|swimmer|boxer|cyclist|sprinter|gymnast|golfer|cricketer|olympian|champion|nobel|laureate|entrepreneur|founder|ceo|billionaire|activist|reformer|suffragette|civil rights|bishop|saint|prophet|mythological|deity|monarch|chancellor|senator|congressm|dictator|revolutionary|warlord/i;

function notabilityScore(b) {
  const p = b.pages?.[0];
  if (!p) return 0;
  let score = 0;
  // Has thumbnail = very likely notable
  if (p.thumbnail) score += 40;
  // Matches a famous-person category
  const desc = (p.description||'').toLowerCase();
  if (NOTABLE_TERMS.test(desc)) score += 30;
  // Longer extract = more written about them
  const extractLen = (p.extract||'').length;
  score += Math.min(extractLen / 100, 20);
  // More recent birth year = more likely people know them
  score += Math.max(0, (b.year - 1400) / 60);
  return score;
}

async function fetchBirthdayCelebs(birth) {
  const mm = String(birth.getMonth()+1).padStart(2,'0');
  const dd = String(birth.getDate()).padStart(2,'0');
  try {
    const d = await fetch(`https://en.wikipedia.org/api/rest_v1/feed/onthisday/births/${mm}/${dd}`).then(r=>r.json());
    const births = (d.births||[]);
    return births
      .filter(b => b.pages?.length && b.pages[0].description)
      .sort((a,b) => notabilityScore(b) - notabilityScore(a))
      .slice(0, 16);
  } catch(e) { return []; }
}

function buildBdCelebsHTML(celebs, birth) {
  if (!celebs.length) return '';
  const dateStr = birth.toLocaleDateString('en-GB',{month:'long',day:'numeric'});
  const cards = celebs.map((b,i)=>{
    const p = b.pages[0];
    const name = p.titles?.normalized || p.normalizedtitle || 'Unknown';
    const desc = (p.description||'').slice(0,70);
    const wikiSlug = p.titles?.canonical || p.title || '';
    const wikiUrl = wikiSlug ? `https://en.wikipedia.org/wiki/${encodeURIComponent(wikiSlug)}` : '';
    const initials = name.split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase();
    const thumbUrl = p.thumbnail?.source ? p.thumbnail.source.replace(/\/\d+px-/, '/120px-') : null;
    const avatarInner = thumbUrl
      ? `<img src="${thumbUrl}" alt="${name}" loading="lazy" onerror="this.parentNode.innerHTML='${initials}';this.parentNode.classList.add('av${i%6}');" />`
      : initials;
    const avatarClass = thumbUrl ? 'celeb-avatar' : `celeb-avatar av${i%6}`;
    const tag = wikiUrl ? 'a' : 'div';
    const attrs = wikiUrl ? `href="${wikiUrl}" target="_blank" rel="noopener"` : '';
    return `
      <${tag} class="celeb-card" ${attrs}>
        <div class="${avatarClass}">${avatarInner}</div>
        <div class="celeb-name">${name}</div>
        <div class="celeb-desc">${desc||'Notable figure'}</div>

  }).join('');
  return `
    <div class="celeb-section">
      <p class="section-label">Famous people who share your birthday — ${dateStr}</p>
      <div class="celeb-grid">${cards}</div>
      <p class="info-note">Click any card to open their Wikipedia page</p>
    </div>`;
}

/* ── Local celebrities (Wikipedia search) ── */
async function fetchLocalCelebs(city) {
  try {
    // Use Wikipedia opensearch + summaries to find notable people from the city
    const searchQ = `notable people born in ${city.name}`;
    const r = await fetch(
      `https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(searchQ)}&srnamespace=0&srlimit=20&format=json&origin=*`
    ).then(res=>res.json());

    const results = (r.query?.search||[]).slice(0,12);
    const summaries = await Promise.allSettled(
      results.map(item =>
        fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(item.title)}`).then(res=>res.json())
      )
    );

    const people = summaries
      .filter(s => s.status==='fulfilled' && s.value?.type==='standard' && s.value?.description)
      .map(s => s.value)
      .filter(p => NOTABLE_TERMS.test(p.description||''))
      .slice(0, 8);
    return people;
  } catch(e) { return []; }
}

/* ── Timeline ── */
function buildTimeline(birthYear, countryCode, countryName) {
  const endYear = Math.min(birthYear+35, new Date().getFullYear());
  const globals   = getGlobalEvents(birthYear, endYear);
  const regionals = getRegionalEvents(birthYear, endYear, countryCode);
  const all = [...globals,...regionals].sort((a,b)=>a.year-b.year);
  if (!all.length) return '';
  return `
    <div class="timeline-section">
      <p class="section-label">Your lifetime timeline</p>
      <div class="tl-legend">
        <div class="tl-legend-item"><span class="tl-dot-legend" style="background:var(--purple-dot)"></span>Global</div>
        <div class="tl-legend-item"><span class="tl-dot-legend" style="background:var(--teal-dot)"></span>Regional — ${countryName||''}</div>
      </div>
      <div class="tl-list">
        <div class="tl-line"></div>
        ${all.map(ev=>`
          <div class="tl-item">
            <div class="tl-dot ${ev.type==='global'?'dot-global':'dot-regional'}"></div>
            <div class="tl-content">
              <div class="tl-year-tag">${ev.year}</div>
              <div class="tl-text">${ev.text}</div>
              <span class="tl-badge ${ev.type==='global'?'tb-global':'tb-regional'}">
                ${ev.type==='global'?'Global':(countryName||'Regional')}
              </span>
            </div>
          </div>`).join('')}
      </div>
    </div>`;
}

/* ── Live counters ── */
let _counterInterval = null;
function startLiveCounters(birth) {
  if (_counterInterval) clearInterval(_counterInterval);
  _counterInterval = setInterval(()=>{
    const now   = new Date();
    const days  = Math.floor((now-birth)/86400000);
    const beats = Math.round(Math.floor((now-birth)/1000)*70/60);
    const dc = document.getElementById('days-counter');
    const hc = document.getElementById('hb-counter');
    if(dc) dc.textContent = days.toLocaleString();
    if(hc) hc.textContent = beats.toLocaleString();
  }, 1000);
}
