<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Life Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f5f5f7;
      --bg-tertiary: #e8e8ed;
      --text-primary: #1d1d1f;
      --text-secondary: #6e6e73;
      --text-tertiary: #aeaeb2;
      --border-light: rgba(0,0,0,0.08);
      --border-mid: rgba(0,0,0,0.14);
      --radius-md: 10px;
      --radius-lg: 14px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --purple-fill: #EEEDFE;
      --purple-text: #534AB7;
      --purple-dot: #7F77DD;
      --teal-fill: #E1F5EE;
      --teal-text: #0F6E56;
      --teal-dot: #1D9E75;
      --hot-fill: #FAECE7;
      --hot-text: #993C1D;
      --cold-fill: #E6F1FB;
      --cold-text: #185FA5;
      --green-fill: #EAF3DE;
      --green-text: #3B6D11;
      --red-fill: #FCEBEB;
      --red-text: #A32D2D;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary: #1c1c1e;
        --bg-secondary: #2c2c2e;
        --bg-tertiary: #3a3a3c;
        --text-primary: #f5f5f7;
        --text-secondary: #aeaeb2;
        --text-tertiary: #6e6e73;
        --border-light: rgba(255,255,255,0.08);
        --border-mid: rgba(255,255,255,0.14);
        --purple-fill: #26215C;
        --purple-text: #AFA9EC;
        --purple-dot: #7F77DD;
        --teal-fill: #04342C;
        --teal-text: #5DCAA5;
        --teal-dot: #1D9E75;
        --hot-fill: #4A1B0C;
        --hot-text: #F0997B;
        --cold-fill: #042C53;
        --cold-text: #85B7EB;
        --green-fill: #173404;
        --green-text: #97C459;
        --red-fill: #501313;
        --red-text: #F09595;
      }
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      padding: 56px 24px 32px;
    }
    .header h1 {
      font-size: 40px;
      font-weight: 600;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #1d1d1f 0%, #6e6e73 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    @media (prefers-color-scheme: dark) {
      .header h1 {
        background: linear-gradient(135deg, #f5f5f7 0%, #aeaeb2 100%);
        -webkit-background-clip: text;
        background-clip: text;
      }
    }
    .header p {
      margin-top: 10px;
      font-size: 17px;
      color: var(--text-secondary);
      font-weight: 400;
    }

    /* ── Form card ── */
    .form-wrap {
      max-width: 560px;
      margin: 0 auto 40px;
      padding: 0 20px;
    }
    .form-card {
      background: var(--bg-secondary);
      border: 0.5px solid var(--border-light);
      border-radius: var(--radius-lg);
      padding: 28px 28px 24px;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }
    @media (max-width: 480px) {
      .form-row { grid-template-columns: 1fr; }
    }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      letter-spacing: 0.4px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .field input {
      width: 100%;
      padding: 10px 14px;
      font-size: 15px;
      font-family: var(--font);
      background: var(--bg-primary);
      color: var(--text-primary);
      border: 0.5px solid var(--border-mid);
      border-radius: var(--radius-md);
      outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus {
      border-color: #0071e3;
      box-shadow: 0 0 0 3px rgba(0,113,227,0.15);
    }
    .autocomplete-wrap { position: relative; }
    #city-suggestions {
      position: absolute;
      top: calc(100% + 6px);
      left: 0; right: 0;
      background: var(--bg-primary);
      border: 0.5px solid var(--border-mid);
      border-radius: var(--radius-md);
      z-index: 100;
      max-height: 220px;
      overflow-y: auto;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
    }
    .sugg-item {
      padding: 11px 16px;
      font-size: 14px;
      color: var(--text-primary);
      cursor: pointer;
      border-bottom: 0.5px solid var(--border-light);
    }
    .sugg-item:last-child { border-bottom: none; }
    .sugg-item:hover { background: var(--bg-secondary); }
    .sugg-country {
      font-size: 12px;
      color: var(--text-secondary);
      margin-left: 6px;
    }
    .btn-main {
      width: 100%;
      padding: 13px;
      background: #0071e3;
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      font-size: 16px;
      font-weight: 500;
      font-family: var(--font);
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      letter-spacing: -0.2px;
    }
    .btn-main:hover { background: #0077ed; }
    .btn-main:active { transform: scale(0.985); }
    .btn-main:disabled { background: var(--bg-tertiary); color: var(--text-secondary); cursor: not-allowed; }

    /* ── Results ── */
    .results {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 20px 60px;
    }
    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 14px;
    }

    /* ── Stats grid ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 36px;
    }
    @media (max-width: 480px) {
      .stats-grid { grid-template-columns: 1fr; }
    }
    .stat-card {
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      padding: 20px 16px;
      text-align: center;
    }
    .stat-icon {
      font-size: 22px;
      margin-bottom: 8px;
    }
    .stat-label-sm {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 6px;
      font-weight: 400;
    }
    .stat-value {
      font-size: 22px;
      font-weight: 600;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.5px;
    }
    .stat-sub {
      font-size: 11px;
      color: var(--text-tertiary);
      margin-top: 4px;
    }

    /* ── Weather card ── */
    .weather-card {
      background: var(--bg-secondary);
      border: 0.5px solid var(--border-light);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin-bottom: 36px;
      display: flex;
      gap: 24px;
      align-items: center;
      flex-wrap: wrap;
    }
    .weather-temp {
      font-size: 56px;
      font-weight: 300;
      color: var(--text-primary);
      letter-spacing: -2px;
      line-height: 1;
    }
    .weather-meta { flex: 1; min-width: 180px; }
    .weather-date {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }
    .weather-city {
      font-size: 16px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 10px;
    }
    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }
    .badge-hot  { background: var(--hot-fill);   color: var(--hot-text);  }
    .badge-cold { background: var(--cold-fill);  color: var(--cold-text); }
    .badge-mild { background: var(--green-fill); color: var(--green-text);}

    /* ── Map ── */
    .map-section { margin-bottom: 36px; }
    .map-wrap {
      border-radius: var(--radius-lg);
      overflow: hidden;
      border: 0.5px solid var(--border-light);
      height: 280px;
    }
    .map-wrap iframe { width: 100%; height: 100%; border: none; display: block; }

    /* ── Wikipedia events ── */
    .wiki-section { margin-bottom: 36px; }
    .wiki-item {
      background: var(--bg-primary);
      border: 0.5px solid var(--border-light);
      border-radius: var(--radius-md);
      padding: 14px 18px;
      margin-bottom: 8px;
    }
    .wiki-year {
      font-size: 12px;
      color: var(--text-secondary);
      font-weight: 500;
      margin-bottom: 3px;
    }
    .wiki-text {
      font-size: 14px;
      color: var(--text-primary);
      line-height: 1.5;
    }

    /* ── Timeline ── */
    .timeline-section { margin-bottom: 36px; }
    .tl-legend {
      display: flex;
      gap: 20px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .tl-legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: var(--text-secondary);
    }
    .tl-dot-legend {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .tl-list { position: relative; }
    .tl-line {
      position: absolute;
      left: 3.5px; top: 8px; bottom: 8px;
      width: 1px;
      background: var(--border-mid);
    }
    .tl-item {
      display: flex;
      gap: 16px;
      margin-bottom: 18px;
      align-items: flex-start;
      position: relative;
    }
    .tl-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-top: 5px;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }
    .dot-global   { background: var(--purple-dot); }
    .dot-regional { background: var(--teal-dot);   }
    .tl-content { flex: 1; }
    .tl-year-tag { font-size: 11px; color: var(--text-tertiary); font-weight: 500; }
    .tl-text {
      font-size: 14px;
      color: var(--text-primary);
      line-height: 1.55;
      margin: 2px 0 5px;
    }
    .tl-badge {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 500;
    }
    .tb-global   { background: var(--purple-fill); color: var(--purple-text); }
    .tb-regional { background: var(--teal-fill);   color: var(--teal-text);   }

    /* ── Utility ── */
    .loading-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-secondary);
      font-size: 15px;
    }
    .loading-dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-tertiary);
      margin: 0 3px;
      animation: bounce 1.2s infinite;
    }
    .loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .loading-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }
    .error-box {
      background: var(--red-fill);
      color: var(--red-text);
      border-radius: var(--radius-md);
      padding: 14px 18px;
      font-size: 14px;
      margin-bottom: 16px;
    }
    .divider {
      height: 0.5px;
      background: var(--border-light);
      margin: 32px 0;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>World Life Tracker</h1>
    <p>Discover the world as it was — and is — around your life</p>
  </div>

  <div class="form-wrap">
    <div class="form-card">
      <div class="form-row">
        <div class="field">
          <label>Date of birth</label>
          <input type="date" id="dob" max="2024-12-31" min="1920-01-01" />
        </div>
        <div class="field autocomplete-wrap">
          <label>City</label>
          <input type="text" id="city-input" placeholder="Type a city..." autocomplete="off" />
          <div id="city-suggestions"></div>
        </div>
      </div>
      <button class="btn-main" id="go-btn" onclick="runTracker()">Explore my life</button>
    </div>
  </div>

  <div id="results-area"></div>

  <script>
    let selectedCity = null;
    let suggTimeout = null;

    document.getElementById('city-input').addEventListener('input', function () {
      clearTimeout(suggTimeout);
      const q = this.value.trim();
      if (q.length < 2) { document.getElementById('city-suggestions').innerHTML = ''; return; }
      suggTimeout = setTimeout(() => fetchCities(q), 300);
    });

    async function fetchCities(q) {
      try {
        const r = await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(q)}&limit=7&lang=en`);
        const d = await r.json();
        const box = document.getElementById('city-suggestions');
        const items = d.features.filter(f =>
          ['city','town','village','locality','municipality'].includes(f.properties.type)
        );
        if (!items.length) { box.innerHTML = ''; return; }
        box.innerHTML = items.map((f, i) => {
          const p = f.properties;
          const name = p.name;
          const sub = [p.state, p.country].filter(Boolean).join(', ');
          return `<div class="sugg-item" onclick="selectCity(${i})">
            ${name}<span class="sugg-country">${sub}</span>
          </div>`;
        }).join('');
        box._items = items;
      } catch (e) { console.warn('City fetch error:', e); }
    }

    function selectCity(i) {
      const box = document.getElementById('city-suggestions');
      const f = box._items[i];
      const p = f.properties;
      selectedCity = {
        name: p.name,
        country: p.country || '',
        countryCode: (p.countrycode || '').toLowerCase(),
        lat: f.geometry.coordinates[1],
        lon: f.geometry.coordinates[0],
        displayName: [p.name, p.state, p.country].filter(Boolean).join(', ')
      };
      document.getElementById('city-input').value = selectedCity.displayName;
      box.innerHTML = '';
    }

    document.addEventListener('click', e => {
      if (!e.target.closest('.autocomplete-wrap'))
        document.getElementById('city-suggestions').innerHTML = '';
    });

    /* ── Main tracker ── */
    async function runTracker() {
      const dobVal = document.getElementById('dob').value;
      if (!dobVal)        { alert('Please enter your date of birth'); return; }
      if (!selectedCity)  { alert('Please select a city from the dropdown'); return; }

      const btn = document.getElementById('go-btn');
      btn.disabled = true;
      btn.textContent = 'Loading…';

      const area = document.getElementById('results-area');
      area.innerHTML = `
        <div class="loading-state">
          Fetching your life data
          <span class="loading-dot"></span>
          <span class="loading-dot"></span>
          <span class="loading-dot"></span>
        </div>`;

      try {
        const birth = new Date(dobVal);
        const year  = birth.getFullYear();
        const today = new Date();

        /* counters */
        const daysLived   = Math.floor((today - birth) / 86400000);
        const secondsLived = Math.floor((today - birth) / 1000);
        const heartbeats  = Math.round(secondsLived * 70 / 60);
        const orbits      = (daysLived / 365.25).toFixed(2);

        /* weather */
        const weatherHTML = await buildWeather(dobVal, birth, year);

        /* wikipedia */
        const wikiHTML = await buildWiki(birth);

        /* timeline */
        const timelineHTML = buildTimeline(year, selectedCity.countryCode, selectedCity.country);

        /* map */
        const mapHTML = buildMap();

        /* stats */
        const statsHTML = buildStats(daysLived, heartbeats, orbits, birth);

        area.innerHTML = `
          <div class="results">
            ${statsHTML}
            <div class="divider"></div>
            ${weatherHTML}
            ${mapHTML}
            <div class="divider"></div>
            ${wikiHTML}
            ${timelineHTML}
          </div>`;

        startLiveCounters(birth);

      } catch (err) {
        area.innerHTML = `<div class="results"><div class="error-box">Error: ${err.message}</div></div>`;
      }

      btn.disabled = false;
      btn.textContent = 'Explore my life';
    }

    /* ── Stats ── */
    function buildStats(days, hb, orbits, birth) {
      const yrs = Math.floor(days / 365);
      const mos = Math.floor((days % 365) / 30);
      return `
        <div style="margin-bottom:0;">
          <p class="section-label">Your life in numbers</p>
          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-icon">📅</div>
              <div class="stat-label-sm">Days lived</div>
              <div class="stat-value" id="days-counter">${days.toLocaleString()}</div>
              <div class="stat-sub">${yrs} yrs ${mos} mo</div>
            </div>
            <div class="stat-card">
              <div class="stat-icon">❤️</div>
              <div class="stat-label-sm">Heartbeats</div>
              <div class="stat-value" id="hb-counter">${hb.toLocaleString()}</div>
              <div class="stat-sub">~70 bpm average</div>
            </div>
            <div class="stat-card">
              <div class="stat-icon">🌍</div>
              <div class="stat-label-sm">Earth orbits</div>
              <div class="stat-value">${orbits}</div>
              <div class="stat-sub">around the Sun</div>
            </div>
          </div>
        </div>`;
    }

    /* ── Weather ── */
    async function buildWeather(dobVal, birth, year) {
      try {
        const { lat, lon } = selectedCity;
        const wDayUrl  = `https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}&start_date=${dobVal}&end_date=${dobVal}&daily=temperature_2m_max,temperature_2m_min&timezone=auto`;
        const curYear  = new Date().getFullYear();
        const yStart   = `${year}-01-01`;
        const yEnd     = year < curYear ? `${year}-12-31` : dobVal;
        const wYearUrl = `https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}&start_date=${yStart}&end_date=${yEnd}&daily=temperature_2m_max&timezone=auto`;

        const [wDay, wYear] = await Promise.all([
          fetch(wDayUrl).then(r => r.json()),
          fetch(wYearUrl).then(r => r.json())
        ]);

        const dayTemp = wDay.daily?.temperature_2m_max?.[0] ?? null;
        let badgeClass = 'badge-mild', badgeText = 'Typical temperature that year';

        if (dayTemp !== null && wYear.daily?.temperature_2m_max) {
          const temps   = wYear.daily.temperature_2m_max.filter(t => t !== null);
          const maxTemp = Math.max(...temps);
          const minTemp = Math.min(...temps);
          const avgTemp = temps.reduce((a, b) => a + b, 0) / temps.length;
          if (Math.abs(dayTemp - maxTemp) < 1.5)     { badgeClass = 'badge-hot';  badgeText = 'One of the hottest days that year'; }
          else if (Math.abs(dayTemp - minTemp) < 1.5) { badgeClass = 'badge-cold'; badgeText = 'One of the coldest days that year'; }
          else if (dayTemp > avgTemp + 5)              { badgeClass = 'badge-hot';  badgeText = 'Warmer than average that year'; }
          else if (dayTemp < avgTemp - 5)              { badgeClass = 'badge-cold'; badgeText = 'Colder than average that year'; }
        }

        const displayTemp = dayTemp !== null ? `${Math.round(dayTemp)}°C` : 'N/A';
        const dateStr = birth.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });

        return `
          <div style="margin-bottom:36px;">
            <p class="section-label">Weather at birth</p>
            <div class="weather-card">
              <div class="weather-temp">${displayTemp}</div>
              <div class="weather-meta">
                <div class="weather-date">Max temperature on ${dateStr}</div>
                <div class="weather-city">${selectedCity.displayName}</div>
                <span class="badge ${badgeClass}">${badgeText}</span>
              </div>
            </div>
          </div>`;
      } catch (e) {
        return `<div class="error-box">Weather data unavailable for this location or date range.</div>`;
      }
    }

    /* ── Map ── */
    function buildMap() {
      const { lat, lon, displayName } = selectedCity;
      const bbox = `${lon - 1},${lat - 0.7},${lon + 1},${lat + 0.7}`;
      return `
        <div class="map-section">
          <p class="section-label">Your place in the world</p>
          <div class="map-wrap">
            <iframe
              src="https://www.openstreetmap.org/export/embed.html?bbox=${bbox}&layer=mapnik&marker=${lat},${lon}"
              allowfullscreen
              title="Map of ${displayName}">
            </iframe>
          </div>
        </div>`;
    }

    /* ── Wikipedia "On this day" ── */
    async function buildWiki(birth) {
      try {
        const mm  = String(birth.getMonth() + 1).padStart(2, '0');
        const dd  = String(birth.getDate()).padStart(2, '0');
        const url = `https://en.wikipedia.org/api/rest_v1/feed/onthisday/events/${mm}/${dd}`;
        const d   = await fetch(url).then(r => r.json());
        const yr  = birth.getFullYear();
        const events = (d.events || [])
          .filter(e => Math.abs(e.year - yr) <= 3)
          .slice(0, 3);

        if (!events.length) return '';

        return `
          <div class="wiki-section">
            <p class="section-label">On this day in history</p>
            ${events.map(ev => `
              <div class="wiki-item">
                <div class="wiki-year">${ev.year}</div>
                <div class="wiki-text">${ev.text}</div>
              </div>`).join('')}
          </div>`;
      } catch (e) {
        return '';
      }
    }

    /* ── Timeline ── */
    function buildTimeline(birthYear, countryCode, countryName) {
      const endYear   = Math.min(birthYear + 35, new Date().getFullYear());
      const globals   = getGlobalEvents(birthYear, endYear);
      const regionals = getRegionalEvents(birthYear, endYear, countryCode, countryName);
      const all = [...globals, ...regionals].sort((a, b) => a.year - b.year);
      if (!all.length) return '';

      return `
        <div class="timeline-section">
          <p class="section-label">Your lifetime timeline</p>
          <div class="tl-legend">
            <div class="tl-legend-item">
              <span class="tl-dot-legend" style="background:var(--purple-dot);"></span>
              Global events
            </div>
            <div class="tl-legend-item">
              <span class="tl-dot-legend" style="background:var(--teal-dot);"></span>
              Regional events (${countryName || ''})
            </div>
          </div>
          <div class="tl-list">
            <div class="tl-line"></div>
            ${all.map(ev => `
              <div class="tl-item">
                <div class="tl-dot ${ev.type === 'global' ? 'dot-global' : 'dot-regional'}"></div>
                <div class="tl-content">
                  <div class="tl-year-tag">${ev.year}</div>
                  <div class="tl-text">${ev.text}</div>
                  <span class="tl-badge ${ev.type === 'global' ? 'tb-global' : 'tb-regional'}">
                    ${ev.type === 'global' ? 'Global' : (countryName || 'Regional')}
                  </span>
                </div>
              </div>`).join('')}
          </div>
        </div>`;
    }

    /* ── Live counters ── */
    function startLiveCounters(birth) {
      setInterval(() => {
        const now      = new Date();
        const days     = Math.floor((now - birth) / 86400000);
        const seconds  = Math.floor((now - birth) / 1000);
        const beats    = Math.round(seconds * 70 / 60);
        const dc = document.getElementById('days-counter');
        const hc = document.getElementById('hb-counter');
        if (dc) dc.textContent = days.toLocaleString();
        if (hc) hc.textContent = beats.toLocaleString();
      }, 1000);
    }
